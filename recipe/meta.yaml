{% set name = "emoji-extractor" %}
{% set version = "17.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/emoji_extractor-{{ version }}.tar.gz
  sha256: 68a4e66bca707a46b6d7c53b62e546d1215c0843b4d4adbc76fe25d621d7d28a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
test:
  imports:
    - emoji_extractor
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
about:
  home: https://github.com/alexanderrobertson/emoji-extractor
  dev_url: https://github.com/alexanderrobertson/emoji-extractor
  summary: Extract, detect and count emoji
  license: MIT
  license_file: LICENSE.txt
extra:
  recipe-maintainers:
    - alexanderrobertson
